# QuantStand Options Engine — Configuration
# Copy to config.yaml and populate with real values
# config.yaml is in .gitignore — never commit real credentials

# Database
database:
  host: localhost
  port: 5432
  name: qs_options
  user: YOUR_DB_USER
  password: YOUR_DB_PASSWORD

# IBKR Gateway
ibkr:
  host: 127.0.0.1
  live_port: 4002
  paper_port: 4003
  client_id: 20          # Use a different client_id from the data collectors

# Scoring engine thresholds (starting defaults — ML layer will optimise these)
# composite_score uses a 10,000x scaling constant on theta_per_collateral;
# scores are in the 0.0–1.5 range for typical qualifying contracts.
scoring:
  min_composite_score: 0.70
  min_annualised_roi: 70.0        # percent
  min_probability_of_profit: 70.0 # percent
  min_open_interest: 500
  dte_min: 15
  dte_max: 25
  strike_range_pct: 20.0          # percent from current price
  iv_percentile_min: 70.0         # do not open below this (0–100 scale)

# Position management
position_management:
  max_concurrent_positions: 3
  max_collateral_per_position_pct: 15.0  # percent of portfolio NAV
  portfolio_nav_usd: 2350000
  early_close_threshold_pct: 25.0        # close when this % of premium remains
  iv_percentile_min: 70.0                # do not open below this
  contracts_per_trade: 5
  max_collateral_per_position_usd: 352500  # strike * 100 * contracts hard cap

# Exit rules
rules:
  dte_entry_min: 15                         # do not open below this DTE
  early_close_dte_boundary: 7               # switch to tight threshold below this DTE
  early_close_threshold_standard: 0.25      # close when current_price <= 25% of entry_price
  early_close_threshold_tight: 0.40         # tighter target inside the boundary
  stop_loss_underlying_price: 250.0         # trigger only when underlying drops below this level
  stop_loss_delta_threshold: 0.40           # also require |delta| >= this before triggering stop
  stop_loss_dte_threshold: 10               # only trigger stop-loss inside this DTE
  earnings_warning_dte: 5                   # alert if earnings fall within this many DTE of expiry

# Telegram notification bot
# Setup: create bot via @BotFather, add as admin to a private channel.
# Fetch chat_id: https://api.telegram.org/bot{TOKEN}/getUpdates
# bot_token and chat_id are secrets — config.yaml is gitignored.
telegram:
  bot_token: YOUR_BOT_TOKEN
  chat_id: YOUR_CHAT_ID
  alert_check_interval_minutes: 5
  briefing_time_et: "16:30"
  timezone: "America/New_York"

# Portfolio — used for SGOV yield estimates in briefing and /pnl command.
# Update sgov_nav_usd whenever capital is deployed from or returned to SGOV.
portfolio:
  sgov_nav_usd: 2350000

# Earnings calendar — update each quarter when earnings dates are confirmed.
# Set to null if no upcoming earnings are known.
# Rule 2 fires if earnings_date <= expiry_date AND within earnings_warning_dte days.
# Rule 2 is DEACTIVATED if earnings_date > expiry_date (position expires safely first).
earnings_calendar:
  VRT:  null   # Q2 2026 earnings TBD
  GEV:  null
  ETN:  null
  GLD:  null   # ETFs have no earnings — leave null
  SLV:  null
  GDX:  null
  ANET: null
  MU:   null
  QQQ:  null

# Paper trading scheduler
simulator:
  mode: PAPER
  cycle_interval_minutes: 15
  market_open: "09:30"
  market_close: "16:00"
  max_entries_per_cycle: 1

# Trade modes
trading:
  mode: PAPER                     # PAPER or LIVE — change deliberately, never accidentally
  paper_gateway_port: 4003
  live_gateway_port: 4002

# Logging
logging:
  level: INFO
  log_dir: /var/log/quantstand/qs_options
